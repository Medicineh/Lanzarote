version: '3.9'
services:
  mongo:
    image: mongo:7
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
  api:
    build: ./apps/api
    command: npm run dev
    volumes: ['./apps/api:/app']
    working_dir: /app
    env_file: ./apps/api/.env.example
    ports: ['4000:4000']
    depends_on: [mongo, redis]
  worker:
    build: ./apps/worker
    command: npm run dev
    volumes: ['./apps/worker:/app']
    working_dir: /app
    environment:
      MONGODB_URI: mongodb://mongo:27017/lanzarote
      REDIS_URL: redis://redis:6379
    depends_on: [mongo, redis]
  web:
    build: ./apps/web
    command: npm run dev
    volumes: ['./apps/web:/app']
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports: ['3000:3000']
    depends_on: [api]
volumes:
  mongo_data:
